<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects Tour</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      padding: 14px 18px;
      border-bottom: 1px solid #dddddd;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .viewer-wrap {
      width: 100%;
      height: calc(100vh - 58px);
      overflow: hidden;
      background: #ffffff;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Projects Tour</h1>
  </header>

  <main class="viewer-wrap">
    <iframe
      src="https://lumalabs.ai/capture/1615AF1B-2A38-4E95-991E-53E839DD1F1F"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </main>
</body>
</html>
